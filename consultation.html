    <div class="container">

        <a class="navbar-brand fw-bold" href="index.html">
            LOSONGO & CO ADVOCATES
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                <li class="nav-item">

                <li class="nav-item">

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<section class="py-5 bg-light">

    <div class="container text-center">

        <h1 class="fw-bold">Book a Consultation</h1>

        <p class="lead">
            Schedule a confidential consultation with our legal team.
        </p>

    </div>

</section>

<section class="py-5">

    <div class="container">

        <div class="row">

            <div class="col-lg-8 mx-auto">

                <div class="card shadow">

                    <div class="card-body p-4">

                        <form>

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Area of Law</label>

                                <select class="form-select">

                                    <option>Corporate Law</option>
                                    <option>Family Law</option>
                                    <option>Criminal Defense</option>
                                    <option>Civil Litigation</option>
                                    <option>Land & Property Law</option>
                                    <option>Employment Law</option>
                                    <option>Intellectual Property Law</option>

                                </select>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Preferred Consultation Date</label>
                                <input type="date" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Describe Your Matter</label>
                                <textarea class="form-control" rows="5"></textarea>
                            </div>

                            <button type="submit" class="btn btn-warning btn-lg">
                                Request Consultation
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</footer>
